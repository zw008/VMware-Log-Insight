# VMware Log Insight (Aria Operations for Logs) Configuration
# Copy to ~/.vmware-log-insight/config.yaml and edit

targets:
  prod:
    host: loginsight.example.com
    username: admin
    port: 9543            # public API port (default 9543)
    verify_ssl: true
    provider: Local       # Local | ActiveDirectory | <vIDM provider name>
    # Optional label for this target. Every tool this skill ships is read-only,
    # so nothing here is ever gated by this. It's a label an environment-scoped
    # 'deny' rule in ~/.vmware/rules.yaml can match on for the write skills —
    # e.g. freeze writes on 'production'. A target with no label is simply not
    # matched by such a rule.
    environment: production
  lab:
    host: 10.0.0.50
    username: admin
    port: 9543
    verify_ssl: false
    provider: Local
    environment: lab

default_target: prod

# Passwords are loaded from environment variables (never stored here):
#   VMWARE_LOG_INSIGHT_PROD_PASSWORD=xxx
#   VMWARE_LOG_INSIGHT_LAB_PASSWORD=xxx
# Or from ~/.vmware-log-insight/.env (chmod 600). Plaintext passwords there are
# auto-rewritten to a grep-safe b64: form on first load (obfuscation, NOT
# encryption). For real at-rest secrecy, inject from a secret manager instead.

# The 'username:' above can be overridden per target the same way, so a
# deployment that injects credentials from a secret store can externalise both
# halves of the pair instead of just the password:
#   VMWARE_LOG_INSIGHT_PROD_USERNAME=svc-loginsight
#   VMWARE_LOG_INSIGHT_LAB_USERNAME=svc-loginsight
# Unset (or empty) falls back to the 'username:' in this file. Both halves are
# re-read on every connect, so rotating an account takes effect together — a
# username left behind by a rotation would pair with the new password and fail.
# Usernames are not b64-obfuscated in .env; only *_PASSWORD keys are, and a
# username is not a secret. 'provider' is not overridable: it selects the
# authentication realm rather than the account, so it does not rotate.
